<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallatin Continuity — Water Resource Management Map</title>
    <meta name="description" content="Interactive map exploring how water flows continuously through zones with different rules — from natural headwaters to urban core.">

    <!-- Mapbox GL JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Zone Labels (positioned on map via JS) -->
    <div id="zone-labels" class="zone-labels">
        <!-- Populated dynamically -->
    </div>

    <!-- ===== HEADER BAR ===== -->
    <header id="header" class="header">
        <div class="header-left">
            <img src="assets/gwc-logo.png" alt="GWC" class="header-logo">
            <div class="header-title">
                <h1>Gallatin Continuity</h1>
                <span class="header-subtitle">Water Resource Management Map</span>
            </div>
        </div>
        <div class="header-right">
            <button id="btn-story" class="header-btn header-btn-text" title="View the story">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 3h12M2 8h8M2 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Story
            </button>
            <a href="https://www.gallatinwatershedcouncil.org/" target="_blank" class="header-btn" title="Gallatin Watershed Council">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M7 15l-4-4m0 0l4-4m-4 4h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180 9 9)"/>
                </svg>
            </a>
            <a href="https://itogeospatial.com" target="_blank" class="header-brand-link" title="Built by Ito Geospatial">
                <span class="built-by">Built by</span>
                <span class="ito-brand">Ito Geospatial</span>
            </a>
        </div>
    </header>

    <!-- ===== MAIN LAYOUT ===== -->
    <div id="app" class="app-layout">

        <!-- TOP LEFT: Legend + Layers Stack -->
        <div id="top-left-controls" class="top-left-controls">
            <!-- Satellite Toggle -->
            <button id="satellite-toggle" class="satellite-toggle" title="Toggle satellite imagery">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 2v12M2 8h12M3.5 4.5l9 7M12.5 4.5l-9 7" stroke="currentColor" stroke-width="1" opacity="0.5"/>
                </svg>
                <span>Satellite</span>
            </button>

            <!-- Legend (always visible when layers are active) -->
            <div id="legend" class="legend-topleft">
                <div class="legend-header">
                    <h4>Legend</h4>
                </div>
                <div id="legend-content" class="legend-content">
                    <!-- Populated dynamically -->
                </div>
            </div>

            <!-- Layers Dropdown -->
            <div id="layers-dropdown" class="layers-dropdown">
                <button id="layers-toggle" class="layers-toggle">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 4l6 3 6-3M2 8l6 3 6-3M2 12l6 3 6-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Layers</span>
                    <svg class="dropdown-chevron" width="12" height="12" viewBox="0 0 16 16" fill="none">
                        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div id="layers-content" class="layers-content">
                    <div id="layer-categories" class="layer-categories"></div>
                </div>
            </div>
        </div>

        <!-- MAP -->
        <main id="map-container" class="map-container">
            <div id="map" class="map"></div>

            <!-- Map Controls -->
            <div class="map-controls">
                <button id="btn-zoom-in" class="map-ctrl-btn" title="Zoom in">+</button>
                <button id="btn-zoom-out" class="map-ctrl-btn" title="Zoom out">−</button>
                <button id="btn-reset-view" class="map-ctrl-btn" title="Reset view">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8a6 6 0 1011.3-2.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M14 2v3.5h-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <!-- Location Query Info Panel -->
            <div id="query-panel" class="query-panel hidden">
                <div class="query-header">
                    <h3>Location Details</h3>
                    <button id="query-close" class="query-close">&times;</button>
                </div>
                <div id="query-content" class="query-content">
                    <!-- Populated on map click -->
                </div>
            </div>

            <!-- Story Panel (always visible on right) -->
            <div id="story-panel" class="story-panel">
                <div class="story-header">
                    <img src="assets/gwc-logo.png" alt="GWC" class="story-logo">
                    <div class="story-header-text">
                        <h3 id="story-title">Bozeman Creek</h3>
                        <span class="story-tagline">Water Flows Continuously</span>
                    </div>
                </div>
                <div id="story-content" class="story-content">
                    <!-- Story content loaded dynamically -->
                </div>
                <div class="story-nav">
                    <button id="story-prev" class="story-nav-btn" disabled>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <span id="story-progress">1 / 6</span>
                    <button id="story-next" class="story-nav-btn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>


            <!-- Zone Toggles (bottom) - Filter map by zone -->
            <div id="zone-toggles" class="zone-toggles">
                <div class="zone-toggles-label">Explore by Zone:</div>
                <div class="zone-toggles-row">
                    <button class="zone-toggle-btn" data-zone="natural">
                        <span class="zone-toggle-icon">🏔️</span>
                        <span class="zone-toggle-name">Natural</span>
                    </button>
                    <button class="zone-toggle-btn" data-zone="rural">
                        <span class="zone-toggle-icon">🌲</span>
                        <span class="zone-toggle-name">Rural</span>
                    </button>
                    <button class="zone-toggle-btn" data-zone="parks">
                        <span class="zone-toggle-icon">🌳</span>
                        <span class="zone-toggle-name">Parks</span>
                    </button>
                    <button class="zone-toggle-btn" data-zone="residential">
                        <span class="zone-toggle-icon">🏡</span>
                        <span class="zone-toggle-name">Residential</span>
                    </button>
                    <button class="zone-toggle-btn" data-zone="urban">
                        <span class="zone-toggle-icon">🏢</span>
                        <span class="zone-toggle-name">Urban Core</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/token.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
